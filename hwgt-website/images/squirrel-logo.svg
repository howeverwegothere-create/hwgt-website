<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">

  <!--
    HWGT Red Squirrel Logo — v4
    Key fix: tail is a clean non-self-intersecting teardrop path, fully solid.
    Squirrel faces left, seated, large bushy tail curls up and to the right.
  -->

  <!-- ===== TAIL — large solid teardrop/C shape ===== -->
  <!-- Trace outer edge clockwise, then inner edge counterclockwise back to start -->
  <path fill="#000" fill-rule="nonzero" d="
    M 118,152
    C 132,158  152,158  165,148
    C 178,138  185,120  182,102
    C 179,84   170,68   167,52
    C 164,36   167,20   157,12
    C 147,4    132,6    120,15
    C 108,24   103,40   105,56
    C 107,72   116,86   113,102
    C 110,118  102,130  104,144
    C 106,150  112,154  118,152
    Z
  "/>

  <!-- ===== BODY (lower torso) ===== -->
  <ellipse cx="82" cy="146" rx="38" ry="26" fill="#000"/>

  <!-- ===== HAUNCH (back leg mass) ===== -->
  <ellipse cx="106" cy="160" rx="22" ry="13" transform="rotate(-15 106 160)" fill="#000"/>

  <!-- ===== NECK ===== -->
  <ellipse cx="68" cy="118" rx="14" ry="20" transform="rotate(-8 68 118)" fill="#000"/>

  <!-- ===== HEAD ===== -->
  <circle cx="55" cy="90" r="28" fill="#000"/>

  <!-- ===== MUZZLE (slight forward protrusion for snout) ===== -->
  <ellipse cx="32" cy="98" rx="12" ry="9" fill="#000"/>

  <!-- ===== EAR (front) ===== -->
  <path fill="#000" d="M 44,70 C 40,56 50,42 60,43 C 70,44 74,58 68,70 Z"/>
  <!-- EAR (back, just behind front ear) -->
  <path fill="#000" d="M 60,68 C 58,54 66,42 74,43 C 82,44 84,58 80,68 Z"/>

  <!-- ===== FRONT ARM ===== -->
  <ellipse cx="38" cy="124" rx="10" ry="18" transform="rotate(8 38 124)" fill="#000"/>

  <!-- ===== FRONT PAWS (holding acorn) ===== -->
  <ellipse cx="32" cy="143" rx="13" ry="7" fill="#000"/>

  <!-- ===== BACK FOOT ===== -->
  <ellipse cx="100" cy="172" rx="18" ry="7" fill="#000"/>

  <!-- ===== FRONT FOOT ===== -->
  <ellipse cx="57" cy="170" rx="14" ry="6" fill="#000"/>

  <!-- ===== ACORN ===== -->
  <ellipse cx="20" cy="138" rx="9" ry="5" fill="#000"/>
  <ellipse cx="20" cy="147" rx="7" ry="9" fill="#000"/>

  <!-- ===== WHITE EYE (with dark pupil) ===== -->
  <circle cx="44" cy="86" r="5" fill="white"/>
  <circle cx="43" cy="86" r="2.5" fill="#111"/>

</svg>